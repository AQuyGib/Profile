name: CI/CD Portfolio Deployment

on:
  push:
    branches:
      - master
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build --if-present

      # ==========================================
      # LUỒNG DEPLOY LÊN VPS SỬ DỤNG DOCKER COMPOSE
      # ==========================================
      - name: Sync Files to VPS via SCP
        if: "${{ secrets.VPS_HOST != '' }}"
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "."
          target: "/home/${{ secrets.VPS_USERNAME }}/cyber-portfolio"
          overwrite: true

      - name: SSH to VPS & Rebuild Docker Containers
        if: "${{ secrets.VPS_HOST != '' }}"
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /home/${{ secrets.VPS_USERNAME }}/cyber-portfolio
            
            # Khởi tạo .env từ GitHub Secrets trên môi trường production
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
            echo "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}" >> .env
            echo "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" >> .env
            echo "MAIL_HOST=${{ secrets.MAIL_HOST }}" >> .env
            echo "MAIL_PORT=${{ secrets.MAIL_PORT }}" >> .env
            echo "MAIL_ENCRYPTION=${{ secrets.MAIL_ENCRYPTION }}" >> .env
            echo "MAIL_FROM_ADDRESS=${{ secrets.MAIL_FROM_ADDRESS }}" >> .env
            
            # Kéo image và tái khởi động các container mới nhất
            docker compose down
            docker compose up -d --build
            
            # Dọn dẹp các Docker image rác không sử dụng
            docker image prune -f

      # ==========================================
      # LUỒNG DEPLOY LÊN RENDER/RAILWAY (PAAS)
      # ==========================================
      - name: Trigger PaaS Deploy Hook (Render / Railway)
        if: "${{ secrets.PAAS_DEPLOY_HOOK != '' }}"
        run: |
          echo "Triggering deployment hook..."
          curl -f -X POST "${{ secrets.PAAS_DEPLOY_HOOK }}"
